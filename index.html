<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <style>
        header {
            background-color: rgb(243, 185, 214);
            color: rgb(255, 255, 255);
            text-align: center;
            max-width: 800px;
            margin:0 auto;
            padding: 16px;
            border: 5px solid rgb(129, 87, 129);
        }

        main {
         background-color: rgb(255, 255, 255);
         color: rgb(243, 185, 214);
         max-width: 800px;
         margin: 0 auto;
         padding: 16px;
        display: flex;
        }

       img { 
           width: 80px;
           height: 80px;
       }

       .Artigo-Autor {
            font-weight: bold;
       }
   </style>
<head>

<body>
    <header>
        <h1>Meu blog</h1>
        <p>Vou compartilhar dicas de maquiagem</p>
    </header>
    <main>

    <img src="imagem blog.png" alt="Bancada de mármore iluminada com produtos de maquiagem organizados, incluindo paleta de sombras neutras, pincéis com cabos de madeira, base líquida, batons nude e um espelho ao fundo.">
    <div>
    <h2>Meu primeiro post</h2>
    <p>Por: Antonella</p>
    <p>Boas-vindas ao meu blog</p>
    <button>🩷</button><span>0</span><button>
    <button>👍</button><span>0</span><button>
</div>

  </main>
</body>
<script>
    const botoes = document.querySelectorAll("button")

    botoes.forEach(function (botao) {
        botao.addEventListener("click", botaoClicado);

        function botaoClicado() {
            console.log("Botao Clicado");
            let texto = botao.querySelector("span");
            texto.textContent++;
        }
    })
</Script>

</html>
